<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字貓大冒險 V34.0</title>
    <style>
        :root { 
            --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f0f4f8; --gold: #f1c40f; --pink: #ff85a1; 
            --cat-color: #f39c12; --cat-scale: 0.85; 
        }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: white; width: 450px; height: 95vh; padding: 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        #lockOverlay { position: absolute; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .lock-input { width: 80%; padding: 15px; border: 2px solid var(--primary); border-radius: 15px; font-size: 18px; text-align: center; margin-bottom: 20px; }

        .screen { display: none; flex: 1; overflow-y: auto; padding: 10px; flex-direction: column; }
        .active { display: flex; }

        /* 貓咪元件 */
        .cat-stage { width: 100%; height: 140px; position: relative; margin: 10px 0; display: flex; justify-content: center; align-items: flex-end; }
        .cat-container { position: absolute; bottom: 15px; width: calc(120px * var(--cat-scale)); height: calc(100px * var(--cat-scale)); animation: lazyWalk 20s infinite linear; }
        .cat-body, .cat-head { position: absolute; background: var(--cat-color); transition: 0.3s; }
        .cat-body { width: 70px; height: 50px; border-radius: 25px 25px 15px 15px; bottom: 10px; left: 15px; z-index: 5; }
        .cat-head { width: 50px; height: 44px; border-radius: 50%; top: 0; left: 10px; z-index: 10; }
        .layer-item { position: absolute; width: 100%; height: 100%; border-radius: inherit; display: none; z-index: 7; }
        .head-layer { width: 120%; height: 85%; top: -65%; left: -10%; z-index: 25; border-radius: 50% 50% 0 0; }
        .socks-layer { height: 60%; bottom: 0; z-index: 8; border-radius: 0 0 5px 5px; }
        .cat-ear { position: absolute; width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 18px solid var(--cat-color); top: -8px; z-index: 9; }
        .cat-ear.l { left: 12px; transform: rotate(-20deg); } .cat-ear.r { left: 40px; transform: rotate(20deg); }
        .cat-eye { position: absolute; width: 6px; height: 6px; background: #333; border-radius: 50%; top: 16px; animation: blink 4s infinite; }
        .cat-eye.l { left: 12px; } .cat-eye.r { right: 12px; }
        .cat-leg { position: absolute; width: 10px; height: 18px; background: var(--cat-color); border-radius: 5px; z-index: 4; }
        .cat-tail { position: absolute; width: 8px; height: 45px; background: var(--cat-color); border-radius: 10px; bottom: 40px; right: 15px; z-index: 3; transform-origin: bottom; animation: tailWag 2s infinite ease-in-out; }

        @keyframes lazyWalk { 0% { left: 5%; transform: scaleX(1); } 50% { left: 80%; transform: scaleX(1); } 51% { transform: scaleX(-1); } 100% { left: 5%; transform: scaleX(-1); } }
        @keyframes tailWag { 0%, 100% { transform: rotate(15deg); } 50% { transform: rotate(40deg); } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0); } }

        /* UI */
        .grid-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-card { border: 1px solid #ddd; padding: 12px; border-radius: 15px; cursor: pointer; background: white; transition: 0.1s; position: relative; }
        .modal { display: none; position: fixed; top: 10%; left: 5%; width: 90%; height: 75%; background: white; z-index: 2000; border-radius: 25px; padding: 20px; box-shadow: 0 0 40px rgba(0,0,0,0.3); overflow-y: auto; }
        .word-slot { display: inline-block; min-width: 25px; border-bottom: 3px solid #333; margin: 0 3px; font-size: 20px; height: 30px; color: var(--primary); font-weight: bold; line-height: 30px; cursor: pointer; }
        .letter-btn { display: inline-block; padding: 8px 12px; margin: 4px; background: white; border: 2px solid var(--primary); border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .tab-btn { padding: 8px 12px; border: none; border-radius: 10px; background: #eee; cursor: pointer; font-size: 14px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .audio-btn { background: var(--primary); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 14px; margin-left: 8px; }
    </style>
</head>
<body>

<div id="lockOverlay">
    <h2 style="color:var(--primary);">🔒 私密同步空間</h2>
    <input type="password" id="authCodeInput" class="lock-input" placeholder="請輸入進入密碼">
    <button onclick="verifyAccess()" style="width:80%; padding:15px; background:var(--primary); color:white; border:none; border-radius:15px; font-size:18px;">同步進度並開始</button>
</div>

<div class="container">
    <div id="topBar" style="display:flex; justify-content:space-between; align-items:center; padding-bottom:10px;">
        <button onclick="goHome()" style="font-size:24px; border:none; background:none; cursor:pointer;">🏠</button>
        <div id="syncStatus" style="font-size:10px; color:#999;">● 雲端已同步</div>
        <div style="font-weight:bold; color:var(--gold);">💰 <span id="coinDisplay">0</span></div>
    </div>

    <div id="lobbyScreen" class="screen active">
        <h3 style="color:var(--primary);">單字探險模式</h3>
        <div class="grid-list">
            <div class="item-card" onclick="showLevelSelect('scramble')">🧩 字母重組</div>
            <div class="item-card" onclick="showLevelSelect('spell')">✍️ 拼字練習</div>
            <div class="item-card" onclick="showLevelSelect('sentence')">📖 例句挑戰</div>
            <div class="item-card" onclick="startReview()" style="background: #fff5f5;">📔 錯題複習 (<span id="wrongCount">0</span>)</div>
        </div>
        <h3 style="color:var(--pink); margin-top:20px;">商城與背包</h3>
        <div class="grid-list">
            <div class="item-card" onclick="toggleModal('shopModal', true)">🛒 商城</div>
            <div class="item-card" onclick="toggleModal('bagModal', true)">🎒 背包</div>
            <div class="item-card" onclick="manualSync()" style="background: #eefaff; grid-column: span 2;">🔄 手動雲端備份</div>
        </div>
    </div>

    <div id="levelScreen" class="screen">
        <h3 id="levelTitle">選擇主題關卡</h3>
        <div id="level-list" class="grid-list"></div>
        <button onclick="goHome()" style="margin-top:20px; padding:10px; border-radius:10px; border:1px solid #ccc;">返回首頁</button>
    </div>

    <div id="gameScreen" class="screen">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#999;">
            <span id="quizModeLabel">探險中</span>
            <span><span id="progressIdx">1</span>/<span id="totalIdx">15</span></span>
        </div>
        <div style="background:#fff; padding:15px; border-radius:20px; margin:10px 0; border:2px solid #eee;">
            <div id="qPos" style="font-size:12px; color:var(--pink); font-weight:bold;">詞性</div>
            <div id="qCn" style="color:var(--primary); font-weight:bold; font-size:22px;">
                <span id="qCnText">單字中文</span>
                <button id="wordVoiceBtn" class="audio-btn" onclick="speakWord()">🔊</button>
            </div>
            <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
            <div id="qSentence" style="font-style:italic; color:#666; font-size:16px;">Sentence...</div>
            <div id="qTrans" style="color:#999; font-size:13px; margin-top:5px;">中文翻譯</div>
            <button id="sentenceVoiceBtn" class="audio-btn" style="width:auto; border-radius:10px; padding:0 8px; margin-top:10px; font-size:12px;" onclick="speakSentence()">🔊 朗讀例句</button>
            <div id="wordSlots" style="margin-top:15px;"></div>
        </div>
        <div id="inputArea" style="min-height:100px;"></div>
        <button id="checkBtn" onclick="checkAnswer()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:15px; font-size:18px; font-weight:bold;">送出答案</button>
    </div>

    <div id="catArea" style="background:#fff; border-top:4px solid var(--pink); padding:10px; margin-top:auto; margin-left:-20px; margin-right:-20px;">
        <div id="catNameLabel" onclick="renameCat()" style="font-weight:bold; color:var(--primary); cursor:pointer;">我的小貓</div>
        <div style="display:flex; justify-content:center; gap:8px; margin:5px 0;">
            <button onclick="care('fish')" class="item-card" style="padding:4px 10px; font-size:12px;">🐟 餵食(<span id="inv-fish">0</span>)</button>
            <button onclick="care('soap')" class="item-card" style="padding:4px 10px; font-size:12px;">🧼 洗澡(<span id="inv-soap">0</span>)</button>
            <button onclick="openToySelect()" class="item-card" style="padding:4px 10px; font-size:12px;">🧶 玩耍</button>
        </div>
        <div class="cat-stage">
            <div id="toyDisplay" style="position:absolute; top:10px; right:50px; font-size:40px; display:none;">⚽</div>
            <div id="catObject" class="cat-container">
                <div class="cat-ear l"></div><div class="cat-ear r"></div>
                <div class="cat-tail"></div>
                <div class="cat-leg" style="left:20px; bottom:0;"><div class="socks-layer layer-item"></div></div>
                <div class="cat-leg" style="left:35px; bottom:-2px;"><div class="socks-layer layer-item"></div></div>
                <div class="cat-leg" style="left:55px; bottom:0;"><div class="socks-layer layer-item"></div></div>
                <div class="cat-leg" style="left:70px; bottom:-2px;"><div class="socks-layer layer-item"></div></div>
                <div class="cat-body"><div id="layer-suit" class="layer-item"></div></div>
                <div class="cat-head">
                    <div id="layer-head" class="head-layer layer-item"></div>
                    <div class="cat-eye l"></div><div class="cat-eye r"></div>
                    <div style="position:absolute; width:6px; height:4px; background:var(--pink); border-radius:50%; top:25px; left:50%; transform:translateX(-50%);"></div>
                </div>
            </div>
        </div>
        <div style="display:flex; justify-content:space-around; font-size:12px; color:#666;">
            <span>🍖 <span id="hVal">80</span>%</span><span>🧼 <span id="cVal">80</span>%</span><span>❤️ <span id="mVal">80</span>%</span>
        </div>
    </div>
</div>

<div id="shopModal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="margin:0;">🛒 貓咪商城</h3>
        <button onclick="toggleModal('shopModal', false)" style="border:none; background:none; font-size:20px;">✖</button>
    </div>
    <div id="shop-tabs" style="display:flex; gap:5px; margin-bottom:15px; overflow-x:auto;">
        <button class="tab-btn active" onclick="renderShop('daily', this)">日常</button>
        <button class="tab-btn" onclick="renderShop('toys', this)">玩具</button>
        <button class="tab-btn" onclick="renderShop('hats', this)">帽子</button>
        <button class="tab-btn" onclick="renderShop('clothes', this)">衣服</button>
        <button class="tab-btn" onclick="renderShop('socks', this)">襪子</button>
    </div>
    <div id="shop-content" class="grid-list"></div>
</div>

<div id="bagModal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="margin:0;">🎒 雲端背包</h3>
        <button onclick="toggleModal('bagModal', false)" style="border:none; background:none; font-size:20px;">✖</button>
    </div>
    <div style="font-weight:bold; margin-bottom:10px; color:var(--primary); text-align:left;">🐱 免費換毛</div>
    <div class="grid-list">
        <div class="item-card" onclick="changeSkin('#f39c12')">橘貓</div>
        <div class="item-card" onclick="changeSkin('#95a5a6')">灰貓</div>
        <div class="item-card" onclick="changeSkin('#34495e')">黑貓</div>
    </div>
    <hr style="margin:15px 0; border:0; border-top:1px solid #eee;">
    <div id="bag-content" class="grid-list"></div>
</div>

<div id="toySelectModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:80%; background:white; z-index:3000; border-radius:25px; padding:20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); text-align:center;">
    <h4>🧸 選擇玩具</h4>
    <div id="toyOptionList" style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin:15px 0;"></div>
    <button onclick="document.getElementById('toySelectModal').style.display='none'" style="padding:8px 20px; border-radius:10px; border:1px solid #ccc;">取消</button>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOiL-ScKXeJQSi4kFw8o5zUWSXjtSdJlQfkZlc7mZxhNgcgmuXCppJejFamm1pxF98/exec"; 
    const MY_PRIVATE_PASSWORD = "0127";

    const themes = {
        'Level 1：人物': [{en:"Adult", cn:"成人", pos:"n.", sen:"A child should be with an adult.", trans:"小孩應該由成人陪同。"}, {en:"Angel", cn:"天使", pos:"n.", sen:"You look like a beautiful angel.", trans:"你看起來像個美麗的天使。"}, {en:"Baby", cn:"嬰兒", pos:"n.", sen:"The baby is sleeping.", trans:"嬰兒正在睡覺。"}, {en:"Boy", cn:"男孩", pos:"n.", sen:"That boy is my brother.", trans:"那個男孩是我弟弟。"}, {en:"Child", cn:"小孩", pos:"n.", sen:"Every child likes to play.", trans:"每個小孩都愛玩。"}],
        'Level 2：外貌': [{en:"Heavy", cn:"重的", pos:"adj.", sen:"The box is heavy.", trans:"箱子很重。"}],
        'Level 3：身體器官': [{en:"Ear", cn:"耳朵", pos:"n.", sen:"We listen with our ears.", trans:"我們用耳朵聽。"}],
        'Level 4：健康醫療': [{en:"Dizzy", cn:"頭暈的", pos:"adj.", sen:"I feel dizzy.", trans:"我覺得頭暈。"}],
        'Level 5：家庭成員': [{en:"Granddaughter", cn:"孫女", pos:"n.", sen:"He loves his granddaughter.", trans:"他愛他的孫女。"}],
        'Level 6：特徵': [{ en: "Marry", cn: "結婚", pos: "v.", sen: "Will you ____ me?", trans: "你願意嫁給/娶我嗎？" }]
    };

    const shopItems = {
        daily: [{id:'f1', name:'鮮魚', price:10, type:'fish'}, {id:'s1', name:'沐浴乳', price:10, type:'soap'}],
        toys: [{id:'t1', name:'皮球', price:20, type:'toy', icon:'⚽'}, {id:'t2', name:'逗貓棒', price:30, type:'toy', icon:'🪄'}],
        hats: [{id:'h1', name:'草帽', price:40, style:'#f0e68c', part:'head'}, {id:'h2', name:'飛行帽', price:90, style:'#8b4513', part:'head'}],
        clothes: [{id:'c1', name:'小T', price:60, style:'#98fb98', part:'suit'}, {id:'c2', name:'背心', price:120, style:'skyblue', part:'suit'}],
        socks: [{id:'k1', name:'白襪', price:15, style:'#ffffff', part:'socks'}, {id:'k2', name:'黑襪', price:15, style:'#333333', part:'socks'}]
    };

    let state = {
        coins: 100, hunger: 80, clean: 80, mood: 80, catName: '我的小貓',
        inventory: { fish: 2, soap: 1 }, bag: [], wrongList: [],
        equipped: { head:null, suit:null, socks:null, color:'#f39c12' },
        quizSet: [], quizIdx: 0, mode: ''
    };

    let currentInputArr = []; let poolLetters = [];

    // 發音功能 (修正：直接抓取資料庫原始文字，避免讀到底線)
    function speakWord() { 
        window.speechSynthesis.cancel();
        const q = state.quizSet[state.quizIdx]; 
        const msg = new SpeechSynthesisUtterance(q.en); 
        msg.lang = 'en-US'; 
        window.speechSynthesis.speak(msg); 
    }
    function speakSentence() { 
        window.speechSynthesis.cancel();
        const q = state.quizSet[state.quizIdx]; 
        const msg = new SpeechSynthesisUtterance(q.sen); // 唸原始句子
        msg.lang = 'en-US'; 
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg); 
    }

    // 遊戲流程
    function startLevel(t) {
        let all = [...themes[t]];
        state.quizSet = all.sort(() => Math.random() - 0.5).slice(0, 15);
        state.quizIdx = 0;
        showScreen('gameScreen');
        loadQuiz();
    }

    function loadQuiz() {
        const q = state.quizSet[state.quizIdx];
        const formattedWord = formatWord(q.en);
        document.getElementById('progressIdx').innerText = state.quizIdx + 1;
        document.getElementById('totalIdx').innerText = state.quizSet.length;
        document.getElementById('qPos').innerText = q.pos;
        
        const qCnText = document.getElementById('qCnText');
        const wordBtn = document.getElementById('wordVoiceBtn');
        const senBtn = document.getElementById('sentenceVoiceBtn');

        if (state.mode === 'sentence') {
            document.getElementById('quizModeLabel').innerText = "📖 例句挑戰";
            qCnText.style.display = "none";
            wordBtn.style.display = "none";
            senBtn.style.display = "inline-block";
        } else {
            document.getElementById('quizModeLabel').innerText = state.mode === 'scramble' ? "🧩 字母重組" : "✍️ 拼字練習";
            qCnText.innerText = q.cn;
            qCnText.style.display = "inline";
            wordBtn.style.display = "inline-block";
            senBtn.style.display = "none";
        }

        const maskedSentence = q.sen.replace(new RegExp(q.en, 'gi'), '______');
        document.getElementById('qSentence').innerText = maskedSentence;
        document.getElementById('qTrans').innerText = q.trans || "";
        document.getElementById('wordSlots').innerHTML = "";
        currentInputArr = []; const area = document.getElementById('inputArea'); area.innerHTML = "";
        
        if(state.mode === 'scramble') {
            poolLetters = formattedWord.split('').sort(() => Math.random() - 0.5);
            renderPool();
            for(let i=0; i<formattedWord.length; i++) {
                document.getElementById('wordSlots').innerHTML += `<span class="word-slot" onclick="removeLetter(${i})"></span>`;
            }
        } else {
            area.innerHTML = `<input type="text" id="spellInput" class="lock-input" style="width:90%;" placeholder="輸入單字" autofocus onkeydown="if(event.key==='Enter') checkAnswer()">`;
        }
    }

    function checkAnswer() {
        const q = state.quizSet[state.quizIdx];
        let ans = state.mode === 'scramble' ? currentInputArr.map(i=>i.char).join('') : document.getElementById('spellInput').value.trim();
        if(ans.toLowerCase() === q.en.toLowerCase()) {
            state.coins += 5; alert("答對了！💰+5"); nextQuestion();
        } else {
            alert("答錯了！正確答案是: " + formatWord(q.en));
            if(!state.wrongList.some(w => w.en === q.en)) state.wrongList.push(q);
            nextQuestion();
        }
        updateUI(); saveLocal();
    }

    function nextQuestion() {
        state.quizIdx++;
        if(state.quizIdx >= state.quizSet.length) {
            alert("🎉 15 題挑戰完成！"); goHome();
        } else loadQuiz();
    }

    // UI & 系統
    function verifyAccess() {
        if (document.getElementById('authCodeInput').value !== MY_PRIVATE_PASSWORD) return alert("密碼錯誤");
        document.getElementById('lockOverlay').style.display = 'none'; loadLocal(); updateUI(); renderShop('daily');
    }
    function formatWord(w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }
    function showLevelSelect(m) { state.mode = m; const list = document.getElementById('level-list'); list.innerHTML = ""; Object.keys(themes).forEach(t => { list.innerHTML += `<div class="item-card" onclick="startLevel('${t}')">🌟 ${t}</div>`; }); showScreen('levelScreen'); }
    function renderPool() { const area = document.getElementById('inputArea'); area.innerHTML = ""; poolLetters.forEach((l, idx) => { if(l !== null) area.innerHTML += `<button class="letter-btn" onclick="addLetter('${l}', ${idx})">${l}</button>`; else area.innerHTML += `<div class="letter-btn" style="opacity:0.2; cursor:default;">&nbsp;</div>`; }); }
    function addLetter(l, idx) { const slots = document.querySelectorAll('.word-slot'); if(currentInputArr.length < poolLetters.length) { currentInputArr.push({char: l, originIdx: idx}); poolLetters[idx] = null; renderPool(); const lastIdx = currentInputArr.length - 1; slots[lastIdx].innerText = l; } }
    function removeLetter(slotIdx) { if(currentInputArr[slotIdx]) { const item = currentInputArr.splice(slotIdx, 1)[0]; poolLetters[item.originIdx] = item.char; renderPool(); const slots = document.querySelectorAll('.word-slot'); slots.forEach(s => s.innerText = ""); currentInputArr.forEach((val, i) => slots[i].innerText = val.char); } }
    function startReview() { if(state.wrongList.length === 0) return alert("沒有錯題！"); state.quizSet = [...state.wrongList].sort(() => Math.random() - 0.5).slice(0, 15); state.quizIdx = 0; state.mode = 'spell'; showScreen('gameScreen'); loadQuiz(); }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function goHome() { showScreen('lobbyScreen'); updateUI(); }
    function toggleModal(id, s) { document.getElementById(id).style.display = s?'block':'none'; }
    function renderShop(cat, btn) { if(btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); } const cont = document.getElementById('shop-content'); cont.innerHTML = ""; shopItems[cat].forEach(i => { cont.innerHTML += `<div class="item-card" onclick="buyItem('${cat}','${i.id}')">${i.name}<br>💰${i.price}</div>`; }); }
    function buyItem(cat, id) { const i = shopItems[cat].find(x => x.id === id); if(state.coins >= i.price) { state.coins -= i.price; if(cat === 'daily') state.inventory[i.type]++; else state.bag.push({...i}); updateUI(); saveLocal(); renderShop(cat); } else alert("金幣不足"); }
    function updateUI() {
        document.getElementById('coinDisplay').innerText = state.coins;
        document.getElementById('wrongCount').innerText = state.wrongList.length;
        document.getElementById('inv-fish').innerText = state.inventory.fish;
        document.getElementById('inv-soap').innerText = state.inventory.soap;
        document.getElementById('hVal').innerText = state.hunger;
        document.getElementById('cVal').innerText = state.clean;
        document.getElementById('mVal').innerText = state.mood;
        document.getElementById('catNameLabel').innerText = state.catName;
        document.documentElement.style.setProperty('--cat-color', state.equipped.color);
        document.getElementById('layer-head').style.display = state.equipped.head ? 'block' : 'none';
        document.getElementById('layer-head').style.background = state.equipped.head || '';
        document.getElementById('layer-suit').style.display = state.equipped.suit ? 'block' : 'none';
        document.getElementById('layer-suit').style.background = state.equipped.suit || '';
        document.querySelectorAll('.socks-layer').forEach(s => { s.style.display = state.equipped.socks ? 'block' : 'none'; s.style.background = state.equipped.socks || ''; });
        const bagCont = document.getElementById('bag-content'); bagCont.innerHTML = "";
        state.bag.forEach((i, idx) => { if(i.type !== 'toy') bagCont.innerHTML += `<div class="item-card" onclick="toggleEquip(${idx})">${i.name}<br>${state.equipped[i.part] === i.style ? '✅' : '👕'}</div>`; else bagCont.innerHTML += `<div class="item-card">🧸 ${i.name}</div>`; });
    }
    function care(t) { if(state.inventory[t] > 0) { state[t === 'fish' ? 'hunger' : 'clean'] = Math.min(100, state[t === 'fish' ? 'hunger' : 'clean'] + 20); state.inventory[t]--; updateUI(); saveLocal(); } else alert("道具不足"); }
    function openToySelect() { const myToys = state.bag.filter(i => i.type === 'toy'); if(myToys.length === 0) return alert("沒玩具！"); const cont = document.getElementById('toyOptionList'); cont.innerHTML = ""; myToys.forEach(t => cont.innerHTML += `<div onclick="useToy('${t.id}')" style="cursor:pointer; font-size:30px;">${t.icon}<br><small>${t.name}</small></div>`); document.getElementById('toySelectModal').style.display = 'block'; }
    function useToy(id) { const toy = state.bag.find(i => i.id === id); document.getElementById('toySelectModal').style.display = 'none'; const disp = document.getElementById('toyDisplay'); disp.innerText = toy.icon; disp.style.display = 'block'; state.mood = Math.min(100, state.mood + 20); setTimeout(() => disp.style.display = 'none', 3000); updateUI(); saveLocal(); }
    function changeSkin(c) { state.equipped.color = c; updateUI(); saveLocal(); }
    function toggleEquip(idx) { const i = state.bag[idx]; state.equipped[i.part] = (state.equipped[i.part] === i.style) ? null : i.style; updateUI(); saveLocal(); }
    function renameCat() { const n = prompt("取名：", state.catName); if(n) { state.catName = n; updateUI(); saveLocal(); } }
    function saveLocal() { localStorage.setItem('catGame_V34', JSON.stringify(state)); if(GOOGLE_SCRIPT_URL.startsWith("http")) fetch(GOOGLE_SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify(state)}); }
    function loadLocal() { const saved = localStorage.getItem('catGame_V34'); if(saved) state = JSON.parse(saved); }
    function manualSync() { if(GOOGLE_SCRIPT_URL.startsWith("http")) fetch(GOOGLE_SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify(state)}); alert("同步完成！"); }
</script>
</body>
</html>
